name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev tooling + runtime deps
        # mcp: so the server-import smoke test actually imports server.py (a
        #      broken decorator/annotation there once shipped green — 16aa6b2).
        # re extras: so the scan-geometry tests run instead of silently skipping.
        run: >-
          python -m pip install --upgrade pip pytest ruff
          "mcp>=1.9,<2" numpy trimesh pyransac3d
      - name: Ruff lint
        run: python -m ruff check .
      - name: Run tests (no skips allowed for missing deps)
        run: python -m pytest -rs
